name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        # --locked: the default lane doubles as the lockfile canary for the
        # native backend's future [patch.crates-io] entry (#640 U7/U9) -- a
        # drifted Cargo.lock fails here instead of being silently rewritten.
        run: cargo clippy --locked --tests -- -D warnings

      - name: App field-count ratchet
        run: bash scripts/check-app-field-count.sh

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

  # MSRV canary (#668): Cargo.toml declares rust-version so users on an old
  # toolchain get a clean "requires rustc X" error instead of an E0658 deep
  # inside a dependency; this lane proves the declared floor still compiles
  # the default tree. Plain `cargo check`, no -D warnings: older rustc's
  # dead-code analysis differs from the pinned toolchain's, and lint drift
  # is not an MSRV break. Not in the required-check set (see note on the
  # native lane below).
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "msrv=$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check (default features)
        env:
          # override rust-toolchain.toml's pin for this job only
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.msrv }}
        run: cargo check --locked

  # The native-backend feature lane (#640 U7). Informational until Phase 3
  # (#643) per the plan's R11 schedule: pre-U9 the feature intentionally
  # stops at a compile_error! marker, and during Phases 0-2 upstream churn
  # may break it without blocking unrelated work. The expected failure is
  # caught INSIDE the step (warning annotation, job stays green) because
  # GitHub renders continue-on-error jobs with the same red X as real
  # failures, which made every PR look broken. A step failure here still
  # reds the job only for infra errors (checkout/toolchain). NOT in the
  # required-check set (branch ruleset 13341653 pins Lint + the three Test
  # jobs by name; this job is additional and must never rename those).
  native:
    name: Native lane (informational until Phase 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: native-backend

      # The presage tree compiles .proto files at build time (#642 U9).
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Clippy and test (native-backend)
        run: |
          status=0
          cargo clippy --locked --tests --no-default-features --features native-backend -- -D warnings || status=1
          if [ "$status" -eq 0 ]; then
            cargo test --locked --no-default-features --features native-backend || status=1
          fi
          if [ "$status" -ne 0 ]; then
            echo "::warning title=Native lane failed::the native-backend lane broke (it has built green since #642 U9); worth a look even though the lane stays informational until Phase 3 (#643)."
          else
            echo "::notice title=Native lane passes::native-backend builds and tests green (informational until Phase 3, #643)."
          fi

  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_command_parse, fuzz_input_edit, fuzz_json_rpc, fuzz_key_combo, fuzz_theme_toml]
    env:
      # cargo-fuzz needs nightly. RUSTUP_TOOLCHAIN overrides
      # rust-toolchain.toml's stable pin for this job only.
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        # Intentionally not --locked: cargo-fuzz's bundled lockfile pins
        # rustix v0.36.5, which uses unstable `rustc_attrs` no longer
        # accepted by current nightly. Resolving fresh transitive deps
        # picks a rustix that compiles.
        run: cargo install cargo-fuzz

      - name: Run ${{ matrix.target }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=60
